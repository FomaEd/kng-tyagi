<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <base href="https://fomaed.github.io/Tyagi-Furniturnie/">
  <title>Калькулятор тяг</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
                * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      padding: 16px;
      min-height: 100vh;
      background: linear-gradient(160deg, #131f1f 0%, #0a5c5c 100%);
      color: #ffffff;
      max-width: 480px;
      margin: 0 auto;
    }
    .logo-wrap {
      text-align: center;
      margin-bottom: 10px;
      margin-top: 8px;
    }
    .logo-wrap img {
      width: 110px;
      opacity: 0.95;
    }
    h2 {
      text-align: center;
      margin-bottom: 20px;
      font-size: 18px;
      color: #ffffff;
      text-shadow: 0 1px 6px rgba(0,0,0,0.4);
    }
    .field { margin-bottom: 14px; }
    label {
      display: block;
      margin-bottom: 5px;
      font-size: 14px;
      font-weight: 600;
      color: #d0f0ec;
    }
    input, select {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 12px;
      font-size: 16px;
      background: rgba(255,255,255,0.12);
      color: #ffffff;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      outline: none;
      transition: border 0.2s;
    }
    input::placeholder { color: rgba(255,255,255,0.45); }
    input:focus, select:focus {
      border: 1px solid rgba(61,191,159,0.8);
      background: rgba(255,255,255,0.18);
    }
    select option {
      background: #0a5c5c;
      color: #ffffff;
    }
    button {
      width: 100%;
      padding: 14px;
      margin-top: 8px;
      background: #3dbf9f;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 18px rgba(61,191,159,0.4);
      transition: opacity 0.2s, transform 0.1s;
    }
    button:active {
      opacity: 0.85;
      transform: scale(0.98);
    }
    #result {
      display: none;
      margin-top: 20px;
      padding: 14px;
      background: rgba(0,0,0,0.35);
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    #result h3 { color: #3dbf9f; margin-bottom: 10px; font-size: 15px; }
    #result ul { padding-left: 18px; }
    #result li { margin-bottom: 6px; font-size: 15px; color: #ffffff; }
    #result li b { color: #ffffff; }
    .error { color: #ff5555; font-weight: bold; }
  </style>
</head>
<body>
  <div class="logo-wrap"><img src="img/logo.png.png" alt="Фуркомплект" /></div>
  <h2>&#128296; Расчёт длин тяг</h2>

  <div class="field">
    <label>Ширина створки W (мм)</label>
    <input id="W" type="number" inputmode="numeric" placeholder="600" />
  </div>

  <div class="field">
    <label>Высота створки H (мм)</label>
    <input id="H" type="number" inputmode="numeric" placeholder="2000" />
  </div>

  <div class="field">
    <label>Высота ручки HC (мм)</label>
    <input id="HC" type="number" inputmode="numeric" placeholder="900" />
  </div>

  <div class="field">
    <label>Тип редуктора</label>
    <select id="reducer">
      <option value="vilka">Переходник (Вилка)</option>
      <option value="torx">Под TORX штифт</option>
      <option value="4gran">Под 4-х гран. штифт</option>
    </select>
  </div>

  <div class="field">
    <label>Тип петель</label>
    <select id="hinges">
      <option value="visible">Видимые</option>
      <option value="hidden90">Скрытые 90&#176;</option>
      <option value="hidden180">Скрытые 180&#176;</option>
    </select>
  </div>

  <button onclick="calculate()">Рассчитать</button>

  <div id="result"></div>

  <script>
    if (window.Telegram && window.Telegram.WebApp) {
      Telegram.WebApp.ready();
      Telegram.WebApp.expand();
    }

    function calculate() {
      var W = parseFloat(document.getElementById('W').value);
      var H = parseFloat(document.getElementById('H').value);
      var HC = parseFloat(document.getElementById('HC').value);
      var reducer = document.getElementById('reducer').value;
      var hinges = document.getElementById('hinges').value;

      var div = document.getElementById('result');
      div.style.display = 'block';

      if (!W || !H || !HC || W <= 0 || H <= 0 || HC <= 0) {
        div.innerHTML = '<p class="error">Заполните пожалуйста все поля!</p>';
        return;
      }

      var C1 = {
        vilka:   { visible: 170, hidden90: 170, hidden180: 75 },
        torx:    { visible: 205, hidden90: 205, hidden180: 225 },
        '4gran': { visible: 228, hidden90: 228, hidden180: 248 }
      };
      var c1 = C1[reducer][hinges];

      var html = '';
      var narrow = null;
      var wide   = null;

      // Видимые петли
      if (hinges === 'visible') {
        if (W >= 390 && W <= 700 && H <= 3000) {
          narrow = [
            ['L1', HC - c1],
            ['L2', H - HC - c1],
            ['L3', W - 350]
          ];

          if (H <= 1800) {
            narrow.push(['L4', H / 2 - 180]);
          } else {
            narrow.push(['L4*', H - 600]);
          }
        }

        if (W >= 701 && W <= 1600 && H <= 3000) {
          wide = [
            ['L1', HC - c1],
            ['L2', H - HC - c1],
            ['L3', W - 495]
          ];

          if (H <= 1800) {
            wide.push(['L4', H / 2 - 180]);
          } else {
            wide.push(['L4*', H - 600]);
          }

          if (W >= 1000) {
  wide.push(['L5', W / 2 - 180]);
          }
        }
      }

      // Скрытые 90°
      if (hinges === 'hidden90') {
        if (W >= 390 && W <= 700 && H <= 3000) {
          narrow = [
            ['L1', HC - c1],
            ['L2', H - HC - c1],
            ['L3', W - 357]
          ];
          if (H <= 1800) {
            narrow.push(['L4', H / 2 - 180]);
          } else {
            narrow.push(['L4*', H - 600]);
          }
        }

        if (W >= 701 && W <= 1600 && H <= 3000) {
          wide = [
            ['L1', HC - c1],
            ['L2', H - HC - c1]
          ];
          if (W <= 1200) {
            wide.push(['L3', W - 547]);
          } else {
            wide.push(['L3*', W - 707]);
          }
          if (H <= 1800) {
            wide.push(['L4', H / 2 - 180]);
          } else {
            wide.push(['L4*', H - 600]);
          }
          if (W >= 1000) {
  wide.push(['L5', W / 2 - 180]);
          }
        }
      }

      // Скрытые 180°
      if (hinges === 'hidden180') {
        var l2Offset;
        var c1hidden180;
        if (reducer === 'vilka') {
          c1hidden180 = 228;
          l2Offset = 208;
        } else if (reducer === 'torx') {
          c1hidden180 = c1;
          l2Offset = 205;
        } else if (reducer === '4gran') {
          c1hidden180 = c1;
          l2Offset = 228;
        }

        if (W >= 445 && W <= 700 && H <= 3000) {
          narrow = [
            ['L1', HC - c1hidden180],
            ['L2', H - HC - l2Offset],
            ['L3', W - 410]
          ];

          if (H <= 1800) {
            narrow.push(['L4', H / 2 - 180]);
          } else {
            narrow.push(['L4*', H - 600]);
          }
        }

        if (W >= 701 && W <= 1600 && H <= 3000) {
          wide = [
            ['L1', HC - c1hidden180],
            ['L2', H - HC - l2Offset]
          ];

          if (W <= 1200) {
            var baseL3 = W - 528;
            wide.push(['L3', baseL3]);
          } else {
            var l3_first  = W - 688;
            var l3_second = W - 940;
            wide.push(['L3*', l3_first  + ' мм — Поворотно-откидной режим']);
            wide.push(['L3*', l3_second + ' мм — Откидно-поворотный режим. + доп. тяга = 215 мм']);
          }

          if (H <= 1800) {
            wide.push(['L4', H / 2 - 180]);
          } else {
            wide.push(['L4*', H - 600]);
          }

          if (W >= 1000) {
  wide.push(['L5', W / 2 - 250]);
          }
        }
      }

      // Формирование HTML (мм добавляем только к числам)
      if (narrow) {
        html += '<h3>&#128208; Узкая створка</h3><ul>';
        for (var i = 0; i < narrow.length; i++) {
          var nameN = narrow[i][0];
          var valN  = narrow[i][1];
          if (typeof valN === 'number') {
            valN = valN + ' мм';
          }
          html += '<li><b>' + nameN + '</b> = ' + valN + '</li>';
        }
        html += '</ul>';
      }

      if (wide) {
        html += '<h3>&#128208; Широкая створка</h3><ul>';
        for (var j = 0; j < wide.length; j++) {
          var nameW = wide[j][0];
          var valW  = wide[j][1];
          if (typeof valW === 'number') {
            valW = valW + ' мм';
          }
          html += '<li><b>' + nameW + '</b> = ' + valW + '</li>';
        }
        html += '</ul>';
      }

      if (!narrow && !wide) {
        html = '<p class="error">Размеры вне допустимого диапазона.</p>';
      }

      // Постоянная картинка — показывается всегда
      html += '<h3>Расположение фурнитурных тяг</h3>';
      html += '<div style="margin-top:12px;">'
        +  '<img src="img/Tyagi.png" '
        +  'style="max-width:100%;border-radius:8px;">'
        +  '</div>';

      // --- Блок картинок с доп. точками прижима ---
      var images = [];

      // Для всех типов петель, если H от 1201 до 1800
      if (H >= 1201 && H <= 1800) {
        images.push('img/L2 1200-1800.png');
      }

      // Для всех типов петель, если H от 1801 до 2400
      if (H >= 1801 && H <= 2400) {
        images.push('img/L1 1800-2400.png');
        images.push('img/L2 1800-2400.png');
        images.push('img/L4 1800-2400.png');
      }

      // Для всех типов петель, если H от 2401 до 3000
      if (H >= 2401 && H <= 3000) {
        images.push('img/L1 2400-3000.png');
        images.push('img/L2 2400-3000.png');
        images.push('img/L4 2400-3000.png');
      }

      // Для всех типов петель, если W от 1001 до 1200
      if (W >= 1001 && W <= 1200) {
        images.push('img/L3 1000-1200.png');
      }

      // Для Видимых и Скрытых 90, если W от 1201 до 1600
      if ((hinges === 'visible' || hinges === 'hidden90') && W >= 1201 && W <= 1600) {
        images.push('img/L3 1000-1200.png');
      }

      // Только для Скрытых 180, если W от 1201 до 1600
      if (hinges === 'hidden180' && W >= 1201 && W <= 1600) {
        images.push('img/L3 1200-16002.png');
        images.push('img/L3 1200-1600.png');
      }

      if (images.length > 0) {
        html += '<h3>Расположение доп. точек прижима</h3>';
        for (var k = 0; k < images.length; k++) {
          html += '<div style="margin-top:8px;">'
               +  '<img src="' + images[k] + '" '
               +  'style="max-width:100%;border-radius:8px;">'
               +  '</div>';
        }
      }
      // --- конец блока картинок ---

      div.innerHTML = html;
    }
  </script>
</body>
</html>
